<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 96">
  <!-- Shield background -->
  <path d="M40 2 L76 14 L76 48 Q75 76 40 94 Q5 76 4 48 L4 14 Z" fill="#0f1f3d" stroke="#c8a94a" stroke-width="2"/>

  <!-- Antenna -->
  <line x1="40" y1="15" x2="40" y2="8" stroke="#f97316" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="40" cy="5.5" r="3.5" fill="#c8a94a"/>

  <!-- Robot head -->
  <rect x="26" y="15" width="28" height="22" rx="4" fill="#f97316"/>
  <!-- Eye sockets -->
  <rect x="30" y="21" width="7" height="6" rx="2" fill="#0f1f3d"/>
  <rect x="43" y="21" width="7" height="6" rx="2" fill="#0f1f3d"/>
  <!-- Eye glow -->
  <rect x="31" y="22" width="5" height="4" rx="1" fill="#7df9ff"/>
  <rect x="44" y="22" width="5" height="4" rx="1" fill="#7df9ff"/>
  <!-- Mouth grill -->
  <rect x="31" y="31" width="3" height="2" rx="1" fill="#0f1f3d" opacity="0.6"/>
  <rect x="37" y="31" width="3" height="2" rx="1" fill="#0f1f3d" opacity="0.6"/>
  <rect x="43" y="31" width="3" height="2" rx="1" fill="#0f1f3d" opacity="0.6"/>

  <!-- Neck -->
  <rect x="36" y="37" width="8" height="4" rx="2" fill="#df6210"/>

  <!-- Robot body -->
  <rect x="25" y="41" width="30" height="22" rx="4" fill="#f97316"/>
  <!-- Chest panel -->
  <rect x="30" y="46" width="20" height="11" rx="2" fill="#0f1f3d" opacity="0.3"/>
  <circle cx="40" cy="51.5" r="3" fill="#7df9ff" opacity="0.65"/>

  <!-- Left arm -->
  <rect x="12" y="43" width="13" height="7" rx="3.5" fill="#f97316"/>

  <!-- Right arm -->
  <rect x="55" y="43" width="12" height="7" rx="3.5" fill="#f97316"/>
  <!-- Forearm angled down -->
  <rect x="61" y="49" width="7" height="9" rx="3" fill="#f97316"/>

  <!-- Basketball -->
  <circle cx="63" cy="67" r="9" fill="#e07020" stroke="#0f1f3d" stroke-width="1.5"/>
  <path d="M54.2 67 Q58.6 62 63 67 Q67.4 72 71.8 67" fill="none" stroke="#0f1f3d" stroke-width="1.2"/>
  <line x1="63" y1="58" x2="63" y2="76" stroke="#0f1f3d" stroke-width="1.2"/>

  <!-- Left leg -->
  <rect x="27" y="63" width="10" height="16" rx="4" fill="#f97316"/>
  <!-- Right leg -->
  <rect x="43" y="63" width="10" height="16" rx="4" fill="#f97316"/>

  <!-- Feet -->
  <rect x="24" y="75" width="15" height="6" rx="3" fill="#c8a94a"/>
  <rect x="41" y="75" width="15" height="6" rx="3" fill="#c8a94a"/>
</svg>
