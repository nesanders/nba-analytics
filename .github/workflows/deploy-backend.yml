name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev
  IMAGE: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/nba-analytics/backend
  SERVICE: nba-analytics-backend

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build and push Docker image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} -t ${{ env.IMAGE }}:latest ./backend
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --max-instances=2 \
            --memory=2Gi \
            --cpu=1 \
            --timeout=60 \
            --service-account=nba-analytics-backend@${{ env.PROJECT_ID }}.iam.gserviceaccount.com \
            --set-env-vars="GCS_BUCKET_NAME=${{ secrets.GCS_BUCKET_NAME }},ALLOWED_ORIGIN=${{ vars.ALLOWED_ORIGIN }},GCS_HMAC_KEY_ID=${{ secrets.GCS_HMAC_KEY_ID }},GCS_HMAC_SECRET=${{ secrets.GCS_HMAC_SECRET }},GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }},GEMINI_AUTH_TOKEN=${{ secrets.GEMINI_AUTH_TOKEN }}"
